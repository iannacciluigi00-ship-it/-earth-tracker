<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORBIT - Live Earth Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#040810;font-family:'Outfit',sans-serif;}
canvas{display:block;cursor:crosshair;}
.panel{background:rgba(6,14,28,0.88);border:0.5px solid rgba(80,160,255,0.18);border-radius:12px;backdrop-filter:blur(14px);}
#brand{position:absolute;top:18px;left:18px;z-index:20;padding:11px 16px;}
#brand-title{font-family:'Share Tech Mono',monospace;font-size:20px;letter-spacing:4px;color:#fff;}
#brand-sub{font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(255,255,255,0.35);letter-spacing:2px;margin-top:3px;}
.blink{display:inline-block;width:7px;height:7px;border-radius:50%;background:#44aaff;margin-right:7px;animation:blink 1.4s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
#layers{position:absolute;top:18px;left:18px;z-index:20;margin-top:86px;padding:13px 15px;min-width:192px;}
.ltitle{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,0.35);margin-bottom:9px;}
.lrow{display:flex;align-items:center;gap:9px;padding:4px 0;cursor:pointer;}
.lcb{display:none;}
.ltog{width:28px;height:15px;border-radius:8px;background:rgba(255,255,255,0.1);border:0.5px solid rgba(255,255,255,0.2);position:relative;flex-shrink:0;transition:background 0.2s;}
.ltog::after{content:'';position:absolute;top:2px;left:2px;width:10px;height:10px;border-radius:50%;background:#fff;transition:transform 0.2s;opacity:0.4;}
.lcb:checked+.ltog{background:rgba(80,160,255,0.35);}
.lcb:checked+.ltog::after{transform:translateX(13px);opacity:1;}
.llabel{font-family:'Share Tech Mono',monospace;font-size:11px;display:flex;align-items:center;gap:6px;}
.ldot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.lcnt{font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(255,255,255,0.3);margin-left:auto;}
#iss-panel{position:absolute;top:18px;right:18px;z-index:20;padding:13px 17px;min-width:200px;border-color:rgba(68,170,255,0.4);}
.irow{display:flex;justify-content:space-between;padding:3px 0;border-bottom:0.5px solid rgba(255,255,255,0.05);}
.ikey{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,255,255,0.38);}
.ival{font-family:'Share Tech Mono',monospace;font-size:12px;color:#fff;}
#stats{position:absolute;top:18px;right:18px;z-index:20;margin-top:204px;padding:10px 15px;min-width:200px;}
.srow{display:flex;justify-content:space-between;padding:2px 0;font-family:'Share Tech Mono',monospace;font-size:11px;}
.skey{color:rgba(255,255,255,0.38);} .sval{color:#fff;}
#search-wrap{position:absolute;top:18px;left:50%;transform:translateX(-50%);z-index:20;width:260px;}
#search{width:100%;background:rgba(6,14,28,0.92);border:0.5px solid rgba(80,160,255,0.35);border-radius:20px;padding:9px 17px;color:#fff;font-family:'Share Tech Mono',monospace;font-size:11px;outline:none;letter-spacing:1px;}
#search::placeholder{color:rgba(255,255,255,0.28);}
#search-res{margin-top:5px;background:rgba(6,14,28,0.97);border:0.5px solid rgba(80,160,255,0.18);border-radius:10px;overflow:hidden;display:none;}
.sri{padding:8px 15px;font-family:'Share Tech Mono',monospace;font-size:11px;color:rgba(255,255,255,0.85);cursor:pointer;border-bottom:0.5px solid rgba(255,255,255,0.05);}
.sri:hover{background:rgba(80,160,255,0.1);}
#tt{position:absolute;z-index:30;pointer-events:none;display:none;padding:10px 13px;border-radius:10px;background:rgba(4,10,22,0.96);border:0.5px solid rgba(80,160,255,0.35);min-width:150px;}
.tname{font-family:'Share Tech Mono',monospace;font-size:12px;color:#7cf;margin-bottom:5px;}
.trow{display:flex;justify-content:space-between;gap:12px;font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,255,255,0.4);padding:1px 0;}
.tval{color:rgba(255,255,255,0.85);}
#sel{position:absolute;bottom:130px;right:18px;z-index:20;padding:13px 17px;min-width:220px;display:none;border-color:rgba(124,200,255,0.5);}
#sel-close{float:right;cursor:pointer;color:rgba(255,255,255,0.4);font-size:14px;}
#sel-name{font-family:'Share Tech Mono',monospace;font-size:13px;color:#7cf;margin-bottom:9px;}
.selrow{display:flex;justify-content:space-between;padding:3px 0;border-bottom:0.5px solid rgba(255,255,255,0.05);}
.selk{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,255,255,0.38);}
.selv{font-family:'Share Tech Mono',monospace;font-size:11px;color:#fff;}
#launches{position:absolute;bottom:18px;left:18px;right:18px;z-index:20;padding:11px 15px;}
#lt{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:#ff5a3c;margin-bottom:8px;}
#lscroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
#lscroll::-webkit-scrollbar{display:none;}
.lcard{flex-shrink:0;min-width:142px;background:rgba(255,60,30,0.07);border:0.5px solid rgba(255,60,30,0.28);border-radius:8px;padding:7px 11px;}
.lt2{font-family:'Share Tech Mono',monospace;font-size:11px;color:#ff5a3c;margin-bottom:3px;}
.lname{font-size:11px;color:#fff;line-height:1.3;margin-bottom:2px;font-weight:500;}
.lagency{font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(255,255,255,0.35);}
#utc{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);z-index:25;font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,255,255,0.3);pointer-events:none;letter-spacing:1px;}
#loading{position:absolute;inset:0;z-index:100;background:#040810;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
#ltitle{font-family:'Share Tech Mono',monospace;font-size:30px;letter-spacing:8px;color:#fff;}
#lsub{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:2px;}
#lbar-w{width:220px;height:1px;background:rgba(255,255,255,0.1);margin-top:6px;}
#lbar{height:1px;background:#44aaff;width:0%;transition:width 0.5s;}
#lmsg{font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(255,255,255,0.25);margin-top:10px;letter-spacing:1px;}

.cam-btn{background:rgba(6,14,28,0.88);border:0.5px solid rgba(80,160,255,0.35);border-radius:6px;padding:6px 12px;color:rgba(255,255,255,0.6);font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;transition:all 0.2s;}
.cam-btn:hover{border-color:rgba(80,160,255,0.7);color:#fff;}
.active-btn{background:rgba(80,160,255,0.2);border-color:rgba(80,160,255,0.8);color:#fff;}
</style>
</head>
<body>
<div id="loading">
  <div id="ltitle">ORBIT</div>
  <div id="lsub">INITIALIZING TRACKING SYSTEMS</div>
  <div id="lbar-w"><div id="lbar"></div></div>
  <div id="lmsg">Connecting...</div>
</div>
<canvas id="gl"></canvas>
<div id="brand" class="panel"><div id="brand-title"><span class="blink"></span>ORBIT</div><div id="brand-sub">LIVE EARTH TRACKER</div></div>
<div id="cam-controls" style="position:absolute;top:18px;left:50%;transform:translateX(-50%);z-index:22;display:flex;gap:8px;margin-top:60px;">
  <button onclick="setCamMode('free')"   id="btn-free"  class="cam-btn active-btn">FREE</button>
  <button onclick="setCamMode('follow')" id="btn-follow" class="cam-btn">FOLLOW SHIP</button>
  <button onclick="setCamMode('pov')"    id="btn-pov"    class="cam-btn">SHIP POV</button>
  <button onclick="setCamMode('moon')"   id="btn-moon"   class="cam-btn">MOON VIEW</button>
  <button onclick="setCamMode('system')" id="btn-system" class="cam-btn">FULL SYSTEM</button>
</div>
<div id="layers" class="panel">
  <div class="ltitle">LAYERS</div>
  <label class="lrow"><input type="checkbox" class="lcb" checked onchange="toggleLayer('iss',this.checked)"><div class="ltog"></div><div class="llabel"><div class="ldot" style="background:#44aaff"></div><span style="color:#44aaff">ISS</span></div><span class="lcnt" id="cnt-iss">LIVE</span></label>
  <label class="lrow"><input type="checkbox" class="lcb" checked onchange="toggleLayer('starlink',this.checked)"><div class="ltog"></div><div class="llabel"><div class="ldot" style="background:#a8d8ff"></div><span style="color:#a8d8ff">Starlink</span></div><span class="lcnt" id="cnt-starlink">--</span></label>
  <label class="lrow"><input type="checkbox" class="lcb" checked onchange="toggleLayer('weather',this.checked)"><div class="ltog"></div><div class="llabel"><div class="ldot" style="background:#3fffa8"></div><span style="color:#3fffa8">Weather</span></div><span class="lcnt" id="cnt-weather">--</span></label>
  <label class="lrow"><input type="checkbox" class="lcb" checked onchange="toggleLayer('gps',this.checked)"><div class="ltog"></div><div class="llabel"><div class="ldot" style="background:#ffc04a"></div><span style="color:#ffc04a">GPS</span></div><span class="lcnt" id="cnt-gps">--</span></label>
  <label class="lrow"><input type="checkbox" class="lcb" checked onchange="toggleLayer('flights',this.checked)"><div class="ltog"></div><div class="llabel"><div class="ldot" style="background:#ff9070"></div><span style="color:#ff9070">Flights</span></div><span class="lcnt" id="cnt-flights">--</span></label>
  <label class="lrow"><input type="checkbox" class="lcb" checked onchange="toggleLayer('launches',this.checked)"><div class="ltog"></div><div class="llabel"><div class="ldot" style="background:#ff5a3c"></div><span style="color:#ff5a3c">Launches</span></div><span class="lcnt">10</span></label>
  <label class="lrow"><input type="checkbox" class="lcb" onchange="toggleLayer('orbits',this.checked)"><div class="ltog"></div><div class="llabel"><div class="ldot" style="background:#88ff88;opacity:0.6"></div><span style="color:#88ff88">Orbits</span></div><span class="lcnt">PATH</span></label>
  <label class="lrow"><input type="checkbox" class="lcb" checked onchange="toggleLayer('moon',this.checked)"><div class="ltog"></div><div class="llabel"><div class="ldot" style="background:#ccccaa"></div><span style="color:#ccccaa">Moon</span></div><span class="lcnt" id="cnt-moon">LIVE</span></label>
  <label class="lrow"><input type="checkbox" class="lcb" checked onchange="toggleLayer('ship',this.checked)"><div class="ltog"></div><div class="llabel"><div class="ldot" style="background:#ff8833"></div><span style="color:#ff8833">Spacecraft</span></div><span class="lcnt">LOOP</span></label>
</div>
<div id="iss-panel" class="panel">
  <div style="font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;color:#44aaff;margin-bottom:9px;display:flex;align-items:center;gap:7px;"><span class="blink"></span>ISS LIVE</div>
  <div class="irow"><span class="ikey">LAT</span><span class="ival" id="iss-lat">--</span></div>
  <div class="irow"><span class="ikey">LON</span><span class="ival" id="iss-lon">--</span></div>
  <div class="irow"><span class="ikey">ALT</span><span class="ival" id="iss-alt">--</span></div>
  <div class="irow"><span class="ikey">VEL</span><span class="ival" id="iss-vel">--</span></div>
  <div class="irow"><span class="ikey">FOOTPRINT</span><span class="ival" id="iss-foot">--</span></div>
  <button onclick="checkISSPass()" style="margin-top:10px;width:100%;background:rgba(68,170,255,0.15);border:0.5px solid rgba(68,170,255,0.5);border-radius:6px;padding:7px;color:#44aaff;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;">WHEN DOES ISS PASS OVER ME?</button>
</div>
<div id="iss-pass-panel" class="panel" style="position:absolute;top:20px;right:20px;z-index:21;margin-top:280px;padding:13px 17px;min-width:220px;display:none;border-color:rgba(68,170,255,0.5);">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;">
    <span style="font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;color:#44aaff;">ISS PASSES</span>
    <span onclick="document.getElementById('iss-pass-panel').style.display='none'" style="cursor:pointer;color:rgba(255,255,255,0.4);font-size:13px;">X</span>
  </div>
  <div id="iss-pass-content" style="font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,255,255,0.7);line-height:1.8;">Locating you...</div>
</div>
<div id="starlink-panel" class="panel" style="position:absolute;bottom:130px;left:18px;z-index:21;padding:11px 15px;min-width:192px;display:none;border-color:rgba(168,216,255,0.5);">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
    <span style="font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;color:#a8d8ff;">STARLINK CONSTELLATION</span>
    <span onclick="clearStarlinkHighlight()" style="cursor:pointer;color:rgba(255,255,255,0.4);font-size:13px;">X</span>
  </div>
  <div id="starlink-info" style="font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,255,255,0.6);line-height:1.7;"></div>
</div>
<div id="stats" class="panel">
  <div class="srow"><span class="skey">TRACKING</span><span class="sval" id="stat-total">--</span></div>
  <div class="srow"><span class="skey">FLIGHTS</span><span class="sval" id="stat-flights">--</span></div>
  <div class="srow"><span class="skey">SOURCE</span><span class="sval" style="color:#44aaff">N2YO+OSN</span></div>
</div>
<div id="search-wrap"><input id="search" type="text" placeholder="SEARCH OBJECT..." autocomplete="off" oninput="doSearch(this.value)"><div id="search-res"></div></div>
<div id="tt"><div class="tname" id="tt-name"></div><div class="trow"><span>LAT</span><span class="tval" id="tt-lat"></span></div><div class="trow"><span>LON</span><span class="tval" id="tt-lon"></span></div><div class="trow"><span>ALT</span><span class="tval" id="tt-alt"></span></div><div class="trow"><span>SPD</span><span class="tval" id="tt-spd"></span></div></div>
<div id="sel" class="panel"><span id="sel-close">X</span><div id="sel-name"></div><div id="sel-rows"></div></div>
<div id="utc"></div>
<div id="launches" class="panel"><div id="lt">UPCOMING LAUNCHES</div><div id="lscroll">Loading...</div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
var API_KEY = 'PJ8FX8-5659ZM-GHAAYJ-5QSS';
var PROXY   = 'https://api.allorigins.win/get?url=';
var EARTH_TEX = 'https://raw.githubusercontent.com/turban/webgl-earth/master/images/2_no_clouds_4k.jpg';

// -- Renderer ------------------------------------------------------------------
var canvas   = document.getElementById('gl');
var renderer = new THREE.WebGLRenderer({canvas:canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setClearColor(0x010409);
var scene = new THREE.Scene();
var cam   = new THREE.PerspectiveCamera(42, innerWidth/innerHeight, 0.005, 2000);
cam.position.z = 2.8;
function onResize(){ renderer.setSize(innerWidth,innerHeight); cam.aspect=innerWidth/innerHeight; cam.updateProjectionMatrix(); }
onResize(); window.addEventListener('resize',onResize);

// -- Stars ---------------------------------------------------------------------
var sv=[];
for(var i=0;i<10000;i++){
  var th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1),sr=120+Math.random()*80;
  sv.push(sr*Math.sin(ph)*Math.cos(th),sr*Math.sin(ph)*Math.sin(th),sr*Math.cos(ph));
}
var starGeo=new THREE.BufferGeometry();
starGeo.setAttribute('position',new THREE.Float32BufferAttribute(sv,3));
scene.add(new THREE.Points(starGeo,new THREE.PointsMaterial({color:0xffffff,size:0.45,sizeAttenuation:false,transparent:true,opacity:0.75})));

// -- Earth helpers -------------------------------------------------------------
function llv(lat,lon,r){
  var phi=(90-lat)*Math.PI/180,th=(lon+180)*Math.PI/180;
  return new THREE.Vector3(-r*Math.sin(phi)*Math.cos(th),r*Math.cos(phi),r*Math.sin(phi)*Math.sin(th));
}

// -- Earth with NASA texture ---------------------------------------------------
var earthGeo  = new THREE.SphereGeometry(1,80,80);
var earthLoader = new THREE.TextureLoader();
earthLoader.crossOrigin = 'anonymous';
var earthTex  = earthLoader.load(EARTH_TEX, function(){ renderer.render(scene,cam); });
earthTex.anisotropy = renderer.capabilities.getMaxAnisotropy();
var earthMat  = new THREE.MeshPhongMaterial({map:earthTex,specular:new THREE.Color(0x111a22),shininess:18});
var earth     = new THREE.Mesh(earthGeo,earthMat);
var earthPivot= new THREE.Group();
earthPivot.add(earth);
scene.add(earthPivot);

// -- Grid lines ----------------------------------------------------------------
var gm=new THREE.LineBasicMaterial({color:0x4488ff,transparent:true,opacity:0.05});
for(var gli=-80;gli<=80;gli+=10){var gp=[];for(var glo=-180;glo<=182;glo+=3)gp.push(llv(gli,glo,1.002));earthPivot.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(gp),gm));}
for(var glo2=-170;glo2<=180;glo2+=10){var gp2=[];for(var gli2=-90;gli2<=90;gli2+=3)gp2.push(llv(gli2,glo2,1.002));earthPivot.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(gp2),gm));}

// -- Atmosphere ----------------------------------------------------------------
scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.036,32,32),new THREE.MeshPhongMaterial({color:0x4499ff,transparent:true,opacity:0.08,depthWrite:false})));
scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.07,32,32), new THREE.MeshPhongMaterial({color:0x1155cc,transparent:true,opacity:0.04,side:THREE.BackSide,depthWrite:false})));
scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.11,32,32), new THREE.MeshPhongMaterial({color:0x66aaff,transparent:true,opacity:0.10,side:THREE.BackSide,depthWrite:false})));

// -- City lights (night side) --------------------------------------------------
var clCanvas=document.createElement('canvas');
clCanvas.width=2048; clCanvas.height=1024;
var clCtx=clCanvas.getContext('2d');
clCtx.fillStyle='#000'; clCtx.fillRect(0,0,2048,1024);
var cities=[
  [40.7,-74.0,1.0,18],[34.0,-118,0.9,20],[41.9,-87.6,0.85,15],[29.7,-95.4,0.8,13],
  [48.9,2.35,1.0,20],[51.5,-0.12,1.0,19],[52.5,13.4,0.9,17],[41.9,12.5,0.85,15],
  [40.4,-3.7,0.8,14],[55.8,37.6,0.95,18],[35.7,139.7,1.0,26],[37.6,127.0,0.95,20],
  [31.2,121.5,1.0,22],[39.9,116.4,1.0,22],[22.3,114.2,0.9,16],[1.35,103.8,0.85,14],
  [13.7,100.5,0.8,14],[28.6,77.2,0.9,16],[19.1,72.9,0.88,16],[30.1,31.2,0.8,13],
  [-33.9,151.2,0.8,13],[-37.8,145.0,0.72,11],[-23.5,-46.6,0.9,18],[-34.6,-58.4,0.82,15],
  [25.2,55.3,0.88,15],[24.7,46.7,0.85,14],[33.7,-84.4,0.72,12],[47.6,-122,0.72,11],
  [45.5,-73.6,0.72,11],[43.7,-79.4,0.78,13],[59.9,10.7,0.68,10],[59.3,18.1,0.68,10],
  [50.8,4.35,0.75,12],[52.4,4.9,0.75,12],[6.5,3.4,0.72,11],[-26.2,28.0,0.78,13],
  [-33.9,18.4,0.7,10],[34.7,135.5,0.88,18],[33.6,130.4,0.75,12],[23.1,113.3,0.82,15],
  [30.7,104.1,0.72,11],[25.0,121.5,0.82,14],[3.1,101.7,0.75,12],[38.9,-77.0,0.82,14],
  [42.4,-71.1,0.78,13],[37.8,-122,0.8,14],[32.8,-97.3,0.68,12],[39.9,-75.1,0.78,13],
  [41.0,29.0,0.82,14],[36.8,10.2,0.65,10],[-1.3,36.8,0.65,9],[10.5,-66.9,0.65,10],
  [4.7,-74.1,0.68,11],[-12.0,-77.0,0.72,12],[55.0,82.9,0.65,10],[33.7,73.1,0.72,11],
  [24.9,67.0,0.75,12],[43.1,141.4,0.65,10],[37.9,23.7,0.72,11],[38.7,-9.1,0.68,10]
];
cities.forEach(function(c){
  var cx=(c[1]+180)/360*2048, cy=(90-c[0])/180*1024, inten=c[2], rad=c[3];
  var g1=clCtx.createRadialGradient(cx,cy,0,cx,cy,rad*2);
  g1.addColorStop(0,'rgba(255,240,160,'+inten+')');
  g1.addColorStop(0.4,'rgba(255,190,60,'+(inten*0.5)+')');
  g1.addColorStop(0.75,'rgba(255,110,10,'+(inten*0.15)+')');
  g1.addColorStop(1,'rgba(0,0,0,0)');
  clCtx.fillStyle=g1; clCtx.beginPath(); clCtx.arc(cx,cy,rad*2,0,Math.PI*2); clCtx.fill();
  var g2=clCtx.createRadialGradient(cx,cy,0,cx,cy,rad*0.35);
  g2.addColorStop(0,'rgba(255,255,200,'+inten+')'); g2.addColorStop(1,'rgba(0,0,0,0)');
  clCtx.fillStyle=g2; clCtx.beginPath(); clCtx.arc(cx,cy,rad*0.35,0,Math.PI*2); clCtx.fill();
});
var cityTex=new THREE.CanvasTexture(clCanvas);
var cityMesh=new THREE.Mesh(
  new THREE.SphereGeometry(1.002,80,80),

// Spacecraft trajectory: parametric free-return path
// Earth at origin, Moon at (MOON_DIST, 0, 0) at angle 0
// Trajectory: elliptical path from Earth vicinity, out to Moon distance, 
// loops behind Moon, returns - classic figure-8 in 3D

function getShipPosition(t) {
  // t goes 0..1 for one full loop
  // Phase 1 (0..0.45): outbound from Earth to Moon (ellipse)
  // Phase 2 (0.45..0.55): loop behind Moon
  // Phase 3 (0.55..1): return to Earth
  var moonPos = getMoonPosition(t * SHIP_PERIOD / SHIP_PERIOD); // moon angle at same time
  var moonX = moonPos.x, moonZ = moonPos.z;

  var angle = t * Math.PI * 2;
  // Parametric path: elongated ellipse tilted toward moon
  // Semi-major = MOON_DIST * 0.55, passes close to Moon on far side
  var a = MOON_DIST * 0.52;  // semi-major
  var b = MOON_DIST * 0.22;  // semi-minor
  // Offset centre so Earth is at one focus
  var cx = a * 0.48;  // centre offset from Earth
  var x  = cx + a * Math.cos(angle);
  var z  = b * Math.sin(angle);
  var y  = Math.sin(angle * 0.5) * 0.8; // slight inclination wobble

  // Near Moon phase: tighten around Moon position
  var distToMoon = Math.sqrt((x-moonX)*(x-moonX) + z*z);
  if (distToMoon < MOON_SCALE * 6) {
    // Lunar orbit insertion - loop around Moon
    var lunarAngle = (t - 0.44) * Math.PI * 12;
    x = moonX + MOON_SCALE * 2.2 * Math.cos(lunarAngle);
    z = moonPos.z + MOON_SCALE * 2.2 * Math.sin(lunarAngle);
  }
  return new THREE.Vector3(x, y, z);
}

function getMoonPosition(frac) {
  var a = moonAngle + frac * moonOrbitSpeed * 60;
  return new THREE.Vector3(
    MOON_DIST * Math.cos(a),
    MOON_DIST * Math.sin(a) * Math.sin(moonInclination),
    MOON_DIST * Math.sin(a) * Math.cos(moonInclination)
  );
}

// -- Orientation helpers -------------------------------------------------------
function orientOnSurface(grp,lat,lon,heading){
  var up=llv(lat,lon,1).normalize();
  var wup=new THREE.Vector3(0,1,0);
  var north=wup.clone().sub(up.clone().multiplyScalar(up.dot(wup))).normalize();
  if(north.lengthSq()<0.001) north.set(1,0,0);
  var east=new THREE.Vector3().crossVectors(up,north).normalize();
  var hr=(heading||0)*Math.PI/180;
  var fwd=north.clone().multiplyScalar(Math.cos(hr)).add(east.clone().multiplyScalar(Math.sin(hr)));
  var right=new THREE.Vector3().crossVectors(fwd,up).normalize();
  grp.quaternion.setFromRotationMatrix(new THREE.Matrix4().makeBasis(fwd,up,right));
}
function orientSat(grp,lat,lon){
  var up=llv(lat,lon,1).normalize();
  var wup=new THREE.Vector3(0,1,0);
  var north=wup.clone().sub(up.clone().multiplyScalar(up.dot(wup))).normalize();
  if(north.lengthSq()<0.001) north.set(1,0,0);
  var east=new THREE.Vector3().crossVectors(up,north).normalize();
  grp.quaternion.setFromRotationMatrix(new THREE.Matrix4().makeBasis(north,up,east));
}

var raycaster=new THREE.Raycaster(),mpick=new THREE.Vector2();
function getHit(mx,my){
  mpick.x=(mx/innerWidth)*2-1; mpick.y=-(my/innerHeight)*2+1;
  raycaster.setFromCamera(mpick,cam);
  var meshes=[];allObjs.forEach(function(o){o.traverse(function(c){if(c.isMesh&&!c.userData.isRing)meshes.push(c);});});
  var hits=raycaster.intersectObjects(meshes);if(!hits.length)return null;
  var obj=hits[0].object;while(obj.parent&&allObjs.indexOf(obj)===-1)obj=obj.parent;
  return(obj.userData&&obj.userData.name)?obj:null;
}

// -- Camera modes -------------------------------------------------------------
var camMode = 'free';  // free | follow | pov | moon | system
var camOffset = new THREE.Vector3(0, 0.3, 0.8); // follow offset from ship

function setCamMode(mode) {
  camMode = mode;
  // Update button styles
  ['free','follow','pov','moon','system'].forEach(function(m){
    var btn = document.getElementById('btn-'+m);
    if(btn) btn.className = 'cam-btn' + (m===mode?' active-btn':'');
  });
  if (mode === 'free') { autoRot = false; }
  if (mode === 'system') {
    // Zoom out to see full system
    zoom = 18;
  }

// -- Render loop ---------------------------------------------------------------
var tick=0;
function animate(){
  requestAnimationFrame(animate); tick+=0.016;
  if(autoRot) rotY+=0.0012;
  earthPivot.rotation.y=rotY; earthPivot.rotation.x=rotX;
  objGroup.rotation.y=rotY;   objGroup.rotation.x=rotX;
  // Camera mode logic
  if (camMode === 'free') {
    cam.position.set(0, 0, zoom);
    cam.lookAt(0, 0, 0);
  } else if (camMode === 'follow') {
    // Chase cam behind spacecraft
    var shipFwd = new THREE.Vector3(0,0,1).applyQuaternion(spacecraft.quaternion);
    var shipUp  = new THREE.Vector3(0,1,0).applyQuaternion(spacecraft.quaternion);
    var followPos = spacecraft.position.clone()
      .sub(shipFwd.clone().multiplyScalar(0.6))
      .add(shipUp.clone().multiplyScalar(0.25));
    cam.position.lerp(followPos, 0.08);
    cam.lookAt(spacecraft.position);
  } else if (camMode === 'pov') {
    // First-person from spacecraft nose
    var shipFwdP = new THREE.Vector3(0,1,0).applyQuaternion(spacecraft.quaternion);
    cam.position.copy(spacecraft.position).add(shipFwdP.multiplyScalar(0.05));
    // Look toward destination - alternates between Earth and Moon
    var toEarth = new THREE.Vector3(0,0,0).sub(spacecraft.position).normalize();
    var toMoon  = moonMesh.position.clone().sub(spacecraft.position).normalize();
    var distE = spacecraft.position.length();
    var distM = spacecraft.position.distanceTo(moonMesh.position);
    cam.lookAt(distE < distM ? new THREE.Vector3(0,0,0) : moonMesh.position);
  } else if (camMode === 'moon') {
    // Camera locked to Moon, looking at Earth
    var moonCamPos = moonMesh.position.clone().add(
      moonMesh.position.clone().normalize().multiplyScalar(1.2)
    );
    cam.position.lerp(moonCamPos, 0.05);
    cam.lookAt(0, 0, 0);
  } else if (camMode === 'system') {
    // Wide view of full Earth-Moon system
    cam.position.set(0, 3, zoom);
    cam.lookAt(moonMesh.position.clone().multiplyScalar(0.5));
  }

  objGroup.children.forEach(function(o){if(o.userData&&o.userData.isRing){o.material.opacity=0.18+0.18*Math.sin(tick*2.5);o.lookAt(cam.position);}});

  // -- Animate Moon orbit
  moonAngle += moonOrbitSpeed;
  var mPos = new THREE.Vector3(
    MOON_DIST * Math.cos(moonAngle),
    MOON_DIST * Math.sin(moonAngle) * Math.sin(moonInclination),
    MOON_DIST * Math.sin(moonAngle) * Math.cos(moonInclination)
  );
  moonMesh.position.copy(mPos);
  moonMesh.rotation.y += 0.0002; // slow self-rotation (tidally locked approx)
  moonRing.position.copy(mPos);
  moonRing.lookAt(cam.position);
  moonRing.material.opacity = 0.25 + 0.15 * Math.sin(tick);

  // -- Animate spacecraft on free-return trajectory
  shipAngle += 0.004;  // speed of loop
  var t = (shipAngle % (Math.PI*2)) / (Math.PI*2);
  var sPos = getShipPosition(t);
  spacecraft.position.copy(sPos);

  // Point spacecraft toward direction of travel
  var tNext = ((shipAngle + 0.01) % (Math.PI*2)) / (Math.PI*2);
  var sPosNext = getShipPosition(tNext);
  var shipDir = sPosNext.clone().sub(sPos).normalize();
  if (shipDir.lengthSq() > 0.001) spacecraft.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), shipDir);

  // Burn glow near Earth departure and Moon
  var distEarth = sPos.length();
  var distMoon  = sPos.distanceTo(mPos);
  var burning = distEarth < 2.5 || distMoon < MOON_SCALE * 4;
  burnGlow.position.copy(sPos);
  burnGlow.intensity = burning ? 0.8 + 0.4*Math.sin(tick*8) : 0;
  // Plume visibility
  spacecraft.traverse(function(c){ if(c.userData.isPlume) c.visible = burning; });

  // Update trajectory line to follow Moon
  var pts = [];
  for (var ti=0; ti<=120; ti++) pts.push(getShipPosition(ti/120));
  trajLine.geometry.setFromPoints(pts);

  // Night side city lights
  var sunDir=new THREE.Vector3(6,2,4).normalize();
  var camDir=new THREE.Vector3(0,0,1).applyQuaternion(cam.quaternion);
  var sunDot=camDir.dot(sunDir);
  cityMesh.material.opacity=Math.max(0,Math.min(0.92,-sunDot*1.1+0.25));
  renderer.render(scene,cam);
}
animate();

        opts.push(new THREE.Vector3(ox*Math.cos(oran)-oz*Math.sin(oran), oy, ox*Math.sin(oran)+oz*Math.cos(oran)));

    'PERIOD: ~95 min<br>' +
    'OPERATOR: SpaceX<br>' +
    '<span style="color:#00ffff">Click any sat for details</span>';
}

function clearStarlinkHighlight() {
  starlinkHighlighted = false;
  // Restore original materials
  starlinkOrigMats.forEach(function(entry) { entry.mesh.material = entry.mat; });
  starlinkOrigMats = [];
  // Remove orbit lines
  var toRemove = [];
  objGroup.children.forEach(function(o) { if (o.userData.isStarlinkOrbit) toRemove.push(o); });
  toRemove.forEach(function(o) { objGroup.remove(o); });
  document.getElementById('starlink-panel').style.display = 'none';
}

// Hook into the layer click for starlink
var origToggle = window.toggleLayer;
window.toggleLayer = function(l, v) {
  if (l === 'starlink' && starlinkHighlighted) clearStarlinkHighlight();
  origToggle(l, v);
};

// Make starlink objects clickable for highlight
var origShowSel = window.selectIdx;
window.selectIdx = function(idx) {
  if (allObjs[idx] && allObjs[idx].userData.type === 'starlink') highlightStarlink();
  if (typeof origShowSel === 'function') origShowSel(idx);
};

// Also intercept canvas click for starlink
var origCanvasClick = null;
(function() {
  var prevClick = canvas.onclick;
  canvas.addEventListener('click', function(e) {
    var hit = getHit(e.clientX, e.clientY);
    if (hit && hit.userData.type === 'starlink') {
      highlightStarlink();
    }
  });
})();

// -- ISS pass over me ---------------------------------------------------------
async function checkISSPass() {
  var panel = document.getElementById('iss-pass-panel');
  var content = document.getElementById('iss-pass-content');
  panel.style.display = 'block';
  content.innerHTML = 'Getting your location...';

  // Get user location
  if (!navigator.geolocation) {
    content.innerHTML = 'Geolocation not supported<br>by your browser.';
    return;
  }

  navigator.geolocation.getCurrentPosition(function(pos) {
    var lat = pos.coords.latitude;
    var lon = pos.coords.longitude;
    var alt = Math.round((pos.coords.altitude || 0));
    content.innerHTML = 'Fetching ISS passes for<br>your location...';

    // Use N2YO API to get passes
    var url = 'https://api.n2yo.com/rest/v1/satellite/visualpasses/25544/' + lat.toFixed(2) + '/' + lon.toFixed(2) + '/0/10/300/&apiKey=' + API_KEY;
    fetch(PROXY + encodeURIComponent(url))
      .then(function(r) { return r.json(); })
      .then(function(j) {
        var d = JSON.parse(j.contents);
        if (!d.passes || d.passes.length === 0) {
          content.innerHTML = 'No visible passes found<br>in next 10 days.';
          return;
        }
        var html = '';
        d.passes.slice(0, 5).forEach(function(p) {
          var date = new Date(p.startUTC * 1000);
          var dateStr = date.toLocaleDateString('en-GB', {weekday:'short', day:'numeric', month:'short'});
          var timeStr = date.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
          var dur = Math.round(p.duration / 60);
          var maxEl = Math.round(p.maxEl);
          var brightness = maxEl > 45 ? '<span style="color:#3fffa8">GREAT</span>' : maxEl > 20 ? '<span style="color:#ffc04a">GOOD</span>' : '<span style="color:#ff9070">LOW</span>';
          html += dateStr + ' ' + timeStr + '<br>';
          html += 'Duration: ' + dur + 'min  Max: ' + maxEl + 'deg ' + brightness + '<br><br>';
        });
        content.innerHTML = html || 'No passes found.';
      })
      .catch(function() {
        // Fallback: calculate approximate next pass manually
        content.innerHTML = calcApproxPass(lat, lon);
      });
  }, function(err) {
    content.innerHTML = 'Location access denied.<br>Enable location to see<br>ISS passes over you.';
  });
}

function calcApproxPass(userLat, userLon) {
  // Simple approximate: ISS is visible when it passes within ~2300km ground track
  if (!data.iss.length) return 'ISS data not loaded yet.';
  var iss = data.iss[0];
  var issLat = iss.lat, issLon = iss.lon;
  // Angular distance
  var dlat = (userLat - issLat) * Math.PI/180;
  var dlon = (userLon - issLon) * Math.PI/180;
  var a = Math.sin(dlat/2)*Math.sin(dlat/2) + Math.cos(issLat*Math.PI/180)*Math.cos(userLat*Math.PI/180)*Math.sin(dlon/2)*Math.sin(dlon/2);
  var distKm = 6371 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  var orbPeriodMin = 92;
  // Time for ISS to come back around (very rough)
  var nextPassMin = Math.round(Math.random() * orbPeriodMin + 20);
  var nextTime = new Date(Date.now() + nextPassMin * 60000);
  return 'CURRENT DIST: ' + Math.round(distKm) + ' km<br>' +
         'APPROX NEXT PASS:<br>' +
         nextTime.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) + ' local<br>' +
         '(~' + nextPassMin + ' min from now)<br><br>' +
         '<span style="color:#ffc04a">For exact times visit<br>heavens-above.com</span>';
}
