<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORBIT - Live Earth Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#040810;font-family:'Outfit',sans-serif;}
canvas{display:block;cursor:crosshair;}
.panel{background:rgba(6,14,28,0.88);border:0.5px solid rgba(80,160,255,0.18);border-radius:12px;backdrop-filter:blur(14px);}
#brand{position:absolute;top:18px;left:18px;z-index:20;padding:11px 16px;}
#brand-title{font-family:'Share Tech Mono',monospace;font-size:20px;letter-spacing:4px;color:#fff;}
#brand-sub{font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(255,255,255,0.35);letter-spacing:2px;margin-top:3px;}
.blink{display:inline-block;width:7px;height:7px;border-radius:50%;background:#44aaff;margin-right:7px;animation:blink 1.4s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
#layers{position:absolute;top:18px;left:18px;z-index:20;margin-top:86px;padding:13px 15px;min-width:192px;}
.ltitle{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,0.35);margin-bottom:9px;}
.lrow{display:flex;align-items:center;gap:9px;padding:4px 0;cursor:pointer;}
.lcb{display:none;}
.ltog{width:28px;height:15px;border-radius:8px;background:rgba(255,255,255,0.1);border:0.5px solid rgba(255,255,255,0.2);position:relative;flex-shrink:0;transition:background 0.2s;}
.ltog::after{content:'';position:absolute;top:2px;left:2px;width:10px;height:10px;border-radius:50%;background:#fff;transition:transform 0.2s;opacity:0.4;}
.lcb:checked+.ltog{background:rgba(80,160,255,0.35);}
.lcb:checked+.ltog::after{transform:translateX(13px);opacity:1;}
.llabel{font-family:'Share Tech Mono',monospace;font-size:11px;display:flex;align-items:center;gap:6px;}
.ldot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.lcnt{font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(255,255,255,0.3);margin-left:auto;}
#iss-panel{position:absolute;top:18px;right:18px;z-index:20;padding:13px 17px;min-width:200px;border-color:rgba(68,170,255,0.4);}
.irow{display:flex;justify-content:space-between;padding:3px 0;border-bottom:0.5px solid rgba(255,255,255,0.05);}
.ikey{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,255,255,0.38);}
.ival{font-family:'Share Tech Mono',monospace;font-size:12px;color:#fff;}
#stats{position:absolute;top:18px;right:18px;z-index:20;margin-top:204px;padding:10px 15px;min-width:200px;}
.srow{display:flex;justify-content:space-between;padding:2px 0;font-family:'Share Tech Mono',monospace;font-size:11px;}
.skey{color:rgba(255,255,255,0.38);} .sval{color:#fff;}
#search-wrap{position:absolute;top:18px;left:50%;transform:translateX(-50%);z-index:20;width:260px;}
#search{width:100%;background:rgba(6,14,28,0.92);border:0.5px solid rgba(80,160,255,0.35);border-radius:20px;padding:9px 17px;color:#fff;font-family:'Share Tech Mono',monospace;font-size:11px;outline:none;letter-spacing:1px;}
#search::placeholder{color:rgba(255,255,255,0.28);}
#search-res{margin-top:5px;background:rgba(6,14,28,0.97);border:0.5px solid rgba(80,160,255,0.18);border-radius:10px;overflow:hidden;display:none;}
.sri{padding:8px 15px;font-family:'Share Tech Mono',monospace;font-size:11px;color:rgba(255,255,255,0.85);cursor:pointer;border-bottom:0.5px solid rgba(255,255,255,0.05);}
.sri:hover{background:rgba(80,160,255,0.1);}
#tt{position:absolute;z-index:30;pointer-events:none;display:none;padding:10px 13px;border-radius:10px;background:rgba(4,10,22,0.96);border:0.5px solid rgba(80,160,255,0.35);min-width:150px;}
.tname{font-family:'Share Tech Mono',monospace;font-size:12px;color:#7cf;margin-bottom:5px;}
.trow{display:flex;justify-content:space-between;gap:12px;font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,255,255,0.4);padding:1px 0;}
.tval{color:rgba(255,255,255,0.85);}
#sel{position:absolute;bottom:130px;right:18px;z-index:20;padding:13px 17px;min-width:220px;display:none;border-color:rgba(124,200,255,0.5);}
#sel-close{float:right;cursor:pointer;color:rgba(255,255,255,0.4);font-size:14px;}
#sel-name{font-family:'Share Tech Mono',monospace;font-size:13px;color:#7cf;margin-bottom:9px;}
.selrow{display:flex;justify-content:space-between;padding:3px 0;border-bottom:0.5px solid rgba(255,255,255,0.05);}
.selk{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,255,255,0.38);}
.selv{font-family:'Share Tech Mono',monospace;font-size:11px;color:#fff;}
#launches{position:absolute;bottom:18px;left:18px;right:18px;z-index:20;padding:11px 15px;}
#lt{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:#ff5a3c;margin-bottom:8px;}
#lscroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
#lscroll::-webkit-scrollbar{display:none;}
.lcard{flex-shrink:0;min-width:142px;background:rgba(255,60,30,0.07);border:0.5px solid rgba(255,60,30,0.28);border-radius:8px;padding:7px 11px;}
.lt2{font-family:'Share Tech Mono',monospace;font-size:11px;color:#ff5a3c;margin-bottom:3px;}
.lname{font-size:11px;color:#fff;line-height:1.3;margin-bottom:2px;font-weight:500;}
.lagency{font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(255,255,255,0.35);}
#utc{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);z-index:25;font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,255,255,0.3);pointer-events:none;letter-spacing:1px;}
#loading{position:absolute;inset:0;z-index:100;background:#040810;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
#ltitle{font-family:'Share Tech Mono',monospace;font-size:30px;letter-spacing:8px;color:#fff;}
#lsub{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:2px;}
#lbar-w{width:220px;height:1px;background:rgba(255,255,255,0.1);margin-top:6px;}
#lbar{height:1px;background:#44aaff;width:0%;transition:width 0.5s;}
#lmsg{font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(255,255,255,0.25);margin-top:10px;letter-spacing:1px;}
</style>
</head>
<body>
<div id="loading">
  <div id="ltitle">ORBIT</div>
  <div id="lsub">INITIALIZING TRACKING SYSTEMS</div>
  <div id="lbar-w"><div id="lbar"></div></div>
  <div id="lmsg">Connecting...</div>
</div>
<canvas id="gl"></canvas>
<div id="brand" class="panel"><div id="brand-title"><span class="blink"></span>ORBIT</div><div id="brand-sub">LIVE EARTH TRACKER</div></div>
<div id="layers" class="panel">
  <div class="ltitle">LAYERS</div>
  <label class="lrow"><input type="checkbox" class="lcb" checked onchange="toggleLayer('iss',this.checked)"><div class="ltog"></div><div class="llabel"><div class="ldot" style="background:#44aaff"></div><span style="color:#44aaff">ISS</span></div><span class="lcnt" id="cnt-iss">LIVE</span></label>
  <label class="lrow"><input type="checkbox" class="lcb" checked onchange="toggleLayer('starlink',this.checked)"><div class="ltog"></div><div class="llabel"><div class="ldot" style="background:#a8d8ff"></div><span style="color:#a8d8ff">Starlink</span></div><span class="lcnt" id="cnt-starlink">--</span></label>
  <label class="lrow"><input type="checkbox" class="lcb" checked onchange="toggleLayer('weather',this.checked)"><div class="ltog"></div><div class="llabel"><div class="ldot" style="background:#3fffa8"></div><span style="color:#3fffa8">Weather</span></div><span class="lcnt" id="cnt-weather">--</span></label>
  <label class="lrow"><input type="checkbox" class="lcb" checked onchange="toggleLayer('gps',this.checked)"><div class="ltog"></div><div class="llabel"><div class="ldot" style="background:#ffc04a"></div><span style="color:#ffc04a">GPS</span></div><span class="lcnt" id="cnt-gps">--</span></label>
  <label class="lrow"><input type="checkbox" class="lcb" checked onchange="toggleLayer('flights',this.checked)"><div class="ltog"></div><div class="llabel"><div class="ldot" style="background:#ff9070"></div><span style="color:#ff9070">Flights</span></div><span class="lcnt" id="cnt-flights">--</span></label>
  <label class="lrow"><input type="checkbox" class="lcb" checked onchange="toggleLayer('launches',this.checked)"><div class="ltog"></div><div class="llabel"><div class="ldot" style="background:#ff5a3c"></div><span style="color:#ff5a3c">Launches</span></div><span class="lcnt">10</span></label>
  <label class="lrow"><input type="checkbox" class="lcb" onchange="toggleLayer('orbits',this.checked)"><div class="ltog"></div><div class="llabel"><div class="ldot" style="background:#88ff88;opacity:0.6"></div><span style="color:#88ff88">Orbits</span></div><span class="lcnt">PATH</span></label>
</div>
<div id="iss-panel" class="panel">
  <div style="font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;color:#44aaff;margin-bottom:9px;display:flex;align-items:center;gap:7px;"><span class="blink"></span>ISS LIVE</div>
  <div class="irow"><span class="ikey">LAT</span><span class="ival" id="iss-lat">--</span></div>
  <div class="irow"><span class="ikey">LON</span><span class="ival" id="iss-lon">--</span></div>
  <div class="irow"><span class="ikey">ALT</span><span class="ival" id="iss-alt">--</span></div>
  <div class="irow"><span class="ikey">VEL</span><span class="ival" id="iss-vel">--</span></div>
  <div class="irow"><span class="ikey">FOOTPRINT</span><span class="ival" id="iss-foot">--</span></div>
</div>
<div id="stats" class="panel">
  <div class="srow"><span class="skey">TRACKING</span><span class="sval" id="stat-total">--</span></div>
  <div class="srow"><span class="skey">FLIGHTS</span><span class="sval" id="stat-flights">--</span></div>
  <div class="srow"><span class="skey">SOURCE</span><span class="sval" style="color:#44aaff">N2YO+OSN</span></div>
</div>
<div id="search-wrap"><input id="search" type="text" placeholder="SEARCH OBJECT..." autocomplete="off" oninput="doSearch(this.value)"><div id="search-res"></div></div>
<div id="tt"><div class="tname" id="tt-name"></div><div class="trow"><span>LAT</span><span class="tval" id="tt-lat"></span></div><div class="trow"><span>LON</span><span class="tval" id="tt-lon"></span></div><div class="trow"><span>ALT</span><span class="tval" id="tt-alt"></span></div><div class="trow"><span>SPD</span><span class="tval" id="tt-spd"></span></div></div>
<div id="sel" class="panel"><span id="sel-close">X</span><div id="sel-name"></div><div id="sel-rows"></div></div>
<div id="utc"></div>
<div id="launches" class="panel"><div id="lt">UPCOMING LAUNCHES</div><div id="lscroll">Loading...</div></div>

cities.forEach(function(c){
  var lat=c[0],lon=c[1],intensity=c[2],rad=c[3];
  var cx=(lon+180)/360*2048, cy=(90-lat)/180*1024;
  var g1=clCtx.createRadialGradient(cx,cy,0,cx,cy,rad*2);
  g1.addColorStop(0,'rgba(255,240,160,'+intensity+')');
  g1.addColorStop(0.35,'rgba(255,190,60,'+(intensity*0.55)+')');
  g1.addColorStop(0.7,'rgba(255,120,10,'+(intensity*0.18)+')');
  g1.addColorStop(1,'rgba(0,0,0,0)');
  clCtx.fillStyle=g1; clCtx.beginPath(); clCtx.arc(cx,cy,rad*2,0,Math.PI*2); clCtx.fill();
  var g2=clCtx.createRadialGradient(cx,cy,0,cx,cy,rad*0.4);
  g2.addColorStop(0,'rgba(255,255,200,'+intensity+')');
  g2.addColorStop(1,'rgba(255,220,80,0)');
  clCtx.fillStyle=g2; clCtx.beginPath(); clCtx.arc(cx,cy,rad*0.4,0,Math.PI*2); clCtx.fill();
});
var cityTex=new THREE.CanvasTexture(clCanvas);
var cityMesh=new THREE.Mesh(
  new THREE.SphereGeometry(1.002,80,80),
  new THREE.MeshBasicMaterial({map:cityTex,transparent:true,opacity:0,blending:THREE.AdditiveBlending,depthWrite:false})
);
earthPivot.add(cityMesh);


var tick=0;
function animate(){
  requestAnimationFrame(animate); tick+=0.016;
  if(autoRot) rotY+=0.0012;
  earthPivot.rotation.y=rotY; earthPivot.rotation.x=rotX;
  objGroup.rotation.y=rotY;   objGroup.rotation.x=rotX;
  cam.position.z=zoom;
  objGroup.children.forEach(function(o){
    if(o.userData&&o.userData.isRing){o.material.opacity=0.18+0.18*Math.sin(tick*2.5);o.lookAt(cam.position);}
  });
  // Night side city lights
  var sunDir=new THREE.Vector3(6,2,4).normalize();
  var camDir=new THREE.Vector3(0,0,1).applyQuaternion(cam.quaternion);
  var sunDot=camDir.dot(sunDir);
  cityMesh.material.opacity=Math.max(0,Math.min(0.9,-sunDot*1.1+0.2));
  renderer.render(scene,cam);
}
animate();

// -- Boot ----------------------------------------------------------------------
function setLoad(msg,pct){document.getElementById('lmsg').textContent=msg;document.getElementById('lbar').style.width=pct+'%';}
function hideLoad(){var el=document.getElementById('loading');el.style.transition='opacity 0.9s';el.style.opacity='0';setTimeout(function(){el.style.display='none';},900);}

async function boot(){
  setLoad('Connecting to ISS...',10); await fetchISS();
  setLoad('Loading Starlink...',25);  await fetchAbove(0,0,0,90,18,'starlink','cnt-starlink');
  setLoad('Loading weather sats...',45); await fetchAbove(0,0,0,90,3,'weather','cnt-weather');
  setLoad('Loading GPS...',62);       await fetchAbove(0,0,0,90,20,'gps','cnt-gps');
  setLoad('Fetching flights...',78);  await fetchFlights();
  setLoad('Loading launches...',92);  await fetchLaunches();
  setLoad('Ready.',100); rebuildObjects();
  setTimeout(hideLoad,400);
  setInterval(fetchISS,5000);
  setInterval(fetchFlights,60000);
  setInterval(fetchLaunches,300000);
}
boot();
